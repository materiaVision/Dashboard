<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Dashboard PRO</title>

<style>
body{
margin:0;
font-family:Segoe UI;
color:#fff;
height:100vh;
display:grid;
grid-template-rows:200px 1fr 120px;
gap:12px;
padding:12px;
background:#0b0f14;
}

/* 🔥 WEATHER PANEL */
#weatherPanel{
background:linear-gradient(135deg,#4facfe,#00c6ff);
border-radius:20px;
padding:20px;
display:flex;
flex-direction:column;
justify-content:space-between;
box-shadow:0 10px 40px rgba(0,0,0,.5);
}

/* TOP */
.weatherTop{
display:flex;
justify-content:space-between;
align-items:center;
}

.weatherTemp{
font-size:64px;
font-weight:300;
}

.weatherDesc{
font-size:18px;
opacity:.9;
}

.weatherIcon{
width:80px;
}

/* DETAILS */
.weatherDetails{
display:flex;
gap:20px;
font-size:14px;
opacity:.9;
}

/* HOURLY */
.hourly{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.hour{
text-align:center;
font-size:12px;
}

.hour img{
width:32px;
}

/* VIEWER */
#viewer{
position:relative;
border-radius:18px;
overflow:hidden;
}

.system{
position:absolute;
width:100%;
height:100%;
border:none;
opacity:0;
transition:0.4s;
}

.system.active{
opacity:1;
}

/* BOTTOM */
#bottom{
display:flex;
gap:12px;
}

.tile{
flex:1;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

</style>
</head>

<body>

<!-- 🔥 WEATHER (JAK NA SCREENIE) -->
<div id="weatherPanel">

<div class="weatherTop">
<div>
<div class="weatherTemp" id="temp">--°C</div>
<div class="weatherDesc" id="desc">Ładowanie...</div>
</div>

<img id="icon" class="weatherIcon">
</div>

<div class="weatherDetails" id="details">
--
</div>

<div class="hourly" id="hourly">
</div>

</div>

<!-- VIEWER -->
<div id="viewer">

<iframe id="radar" class="system active"
src="https://embed.windy.com/embed2.html?lat=53.12&lon=18.00&zoom=6&overlay=radar"></iframe>

<iframe id="its" class="system"
src="https://www.its.bydgoszcz.pl/mapa"></iframe>

</div>

<!-- BOTTOM -->
<div id="bottom">
<div class="tile" onclick="show('radar')">RADAR</div>
<div class="tile" onclick="show('its')">ITS</div>
</div>

<script>

// SWITCH
function show(id){
document.querySelectorAll(".system").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// WEATHER
async function loadWeather(){

const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=53.1235&longitude=18.0084&hourly=temperature_2m,weathercode&current_weather=true&timezone=auto");
const data = await res.json();

// CURRENT
const w = data.current_weather;

document.getElementById("temp").innerText = w.temperature + "°C";

document.getElementById("desc").innerText = "Aktualna pogoda";

document.getElementById("icon").src =
w.weathercode < 3
? "https://cdn-icons-png.flaticon.com/512/869/869869.png"
: "https://cdn-icons-png.flaticon.com/512/414/414825.png";

// DETAILS
document.getElementById("details").innerText =
"Wiatr: " + w.windspeed + " km/h";

// HOURLY
let html = "";

for(let i=0;i<8;i++){
const hour = data.hourly.time[i].slice(11,16);
const temp = Math.round(data.hourly.temperature_2m[i]);

html += `
<div class="hour">
<div>${hour}</div>
<img src="${document.getElementById("icon").src}">
<div>${temp}°</div>
</div>
`;
}

document.getElementById("hourly").innerHTML = html;

}

loadWeather();

</script>

</body>
</html>
