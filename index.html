<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminal Clone</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
background:#0b0f14;
color:#cfd8dc;
font-family:Segoe UI;
display:grid;
grid-template-columns:280px 1fr 320px;
grid-template-rows:60px 1fr 220px;
gap:8px;
height:100vh;
padding:8px;
}

/* TOP BAR */
#topbar{
grid-column:1/4;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 10px;
background:#0f1620;
border:1px solid rgba(255,255,255,.05);
border-radius:8px;
}

/* PANELS */
.panel{
background:#0f1620;
border:1px solid rgba(255,255,255,.05);
border-radius:8px;
padding:8px;
display:flex;
flex-direction:column;
}

/* LEFT */
#left{grid-column:1;grid-row:2;display:flex;flex-direction:column;gap:8px;}
/* CENTER */
#center{grid-column:2;grid-row:2;}
/* RIGHT */
#right{grid-column:3;grid-row:2;display:flex;flex-direction:column;gap:8px;}
/* BOTTOM */
#bottom{grid-column:1/4;grid-row:3;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}

h4{
margin:0 0 6px 0;
font-size:12px;
color:#7f8c8d;
}

.asset{
display:flex;
justify-content:space-between;
font-size:13px;
}

.green{color:#00ff88;}
.red{color:#ff3b3b;}

canvas{height:40px!important;}

iframe{
width:100%;
height:100%;
border:none;
border-radius:6px;
}
</style>
</head>

<body>

<!-- TOP -->
<div id="topbar">
<div id="clock"></div>
<div>DASHBOARD TERMINAL</div>
<div id="date"></div>
</div>

<!-- LEFT -->
<div id="left">

<div class="panel">
<h4>CRYPTO</h4>
<div class="asset"><span id="btcPrice"></span><span id="btcChange"></span></div>
<canvas id="btcChart"></canvas>
<div class="asset"><span id="ethPrice"></span><span id="ethChange"></span></div>
<canvas id="ethChart"></canvas>
</div>

<div class="panel">
<h4>INDICES</h4>
<div class="asset">SP500 <span class="green">+0.48%</span></div>
<div class="asset">NASDAQ <span class="green">+0.72%</span></div>
<div class="asset">WIG20 <span class="green">+0.62%</span></div>
</div>

<div class="panel">
<h4>FOREX</h4>
<div class="asset">EUR/PLN <span>4.29</span></div>
<div class="asset">USD/PLN <span>3.96</span></div>
</div>

</div>

<!-- CENTER -->
<div id="center" class="panel">
<iframe src="https://embed.windy.com/embed2.html?lat=53.1&lon=18&zoom=6&overlay=radar"></iframe>
</div>

<!-- RIGHT -->
<div id="right">

<div class="panel">
<h4>NEWS</h4>
<ul id="news"></ul>
</div>

<div class="panel">
<h4>AIR</h4>
<div id="air"></div>
</div>

</div>

<!-- BOTTOM -->
<div id="bottom">

<div class="panel">
<h4>TRAFFIC</h4>
<iframe src="https://www.google.com/maps?q=traffic%20Bydgoszcz&output=embed"></iframe>
</div>

<div class="panel">
<h4>FLIGHTS</h4>
<iframe src="https://globe.adsbexchange.com/"></iframe>
</div>

<div class="panel">
<h4>SUN</h4>
<div id="sun"></div>
</div>

</div>

<script>

// CLOCK
setInterval(()=>{
let d=new Date();
clock.innerText=d.toLocaleTimeString();
date.innerText=d.toLocaleDateString();
},1000);

// CHART
let btcData=[], ethData=[];

let btcChart=new Chart(btcChart,{
type:"line",
data:{labels:[],datasets:[{data:btcData,borderColor:"#00ff88"}]},
options:{plugins:{legend:false},scales:{x:{display:false},y:{display:false}}}
});

let ethChart=new Chart(ethChart,{
type:"line",
data:{labels:[],datasets:[{data:ethData,borderColor:"#00aaff"}]},
options:{plugins:{legend:false},scales:{x:{display:false},y:{display:false}}}
});

// CRYPTO
async function loadCrypto(){
let btc=await fetch("https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT").then(r=>r.json());
let eth=await fetch("https://api.binance.com/api/v3/ticker/24hr?symbol=ETHUSDT").then(r=>r.json());

let btcP=parseFloat(btc.lastPrice);
let ethP=parseFloat(eth.lastPrice);

btcPrice.innerText="BTC "+btcP.toFixed(0);
btcChange.innerText=btc.priceChangePercent+"%";
btcChange.className=btc.priceChangePercent>0?"green":"red";

ethPrice.innerText="ETH "+ethP.toFixed(0);
ethChange.innerText=eth.priceChangePercent+"%";
ethChange.className=eth.priceChangePercent>0?"green":"red";

btcData.push(btcP);
ethData.push(ethP);

if(btcData.length>30) btcData.shift();
if(ethData.length>30) ethData.shift();

btcChart.update();
ethChart.update();
}
loadCrypto();
setInterval(loadCrypto,4000);

// NEWS
fetch("https://api.allorigins.win/get?url="+encodeURIComponent("https://www.bankier.pl/rss/wiadomosci.xml"))
.then(r=>r.json())
.then(d=>{
let xml=new DOMParser().parseFromString(d.contents,"text/xml");
xml.querySelectorAll("item").forEach((i,x)=>{
if(x<5){
let li=document.createElement("li");
li.innerText=i.querySelector("title").textContent;
news.appendChild(li);
}
});
});

// AIR
fetch("https://api.openaq.org/v2/latest?coordinates=53.12,18.00")
.then(r=>r.json())
.then(d=>{
air.innerText="PM2.5: "+(d.results[0]?.measurements[0]?.value || "brak");
});

// SUN
fetch("https://api.sunrise-sunset.org/json?lat=53.12&lng=18.00&formatted=0")
.then(r=>r.json())
.then(d=>{
sun.innerText="↑ "+new Date(d.results.sunrise).toLocaleTimeString()+" ↓ "+new Date(d.results.sunset).toLocaleTimeString();
});

</script>

</body>
</html>
