<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminal Clone</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
background:#0b0f14;
color:#cfd8dc;
font-family:Segoe UI;
display:grid;
grid-template-columns:260px 1fr 320px;
grid-template-rows:50px 1fr 200px;
gap:6px;
height:100vh;
padding:6px;
}

/* TOP */
#top{
grid-column:1/4;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 10px;
background:#0f1620;
border:1px solid rgba(255,255,255,.05);
}

/* PANEL */
.panel{
background:#0f1620;
border:1px solid rgba(255,255,255,.05);
padding:6px;
display:flex;
flex-direction:column;
}

/* LAYOUT */
#left{grid-column:1;grid-row:2;display:flex;flex-direction:column;gap:6px;}
#center{grid-column:2;grid-row:2;}
#right{grid-column:3;grid-row:2;display:flex;flex-direction:column;gap:6px;}
#bottom{grid-column:1/4;grid-row:3;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}

h4{
margin:0 0 4px 0;
font-size:11px;
color:#6c7a89;
}

/* ASSET */
.asset{
display:grid;
grid-template-columns:60px 1fr 60px;
align-items:center;
font-size:12px;
margin-bottom:4px;
}

canvas{height:30px!important;}

.green{color:#00ff88;}
.red{color:#ff3b3b;}

iframe{width:100%;height:100%;border:none;}

</style>
</head>

<body>

<div id="top">
<div id="clock"></div>
<div>TERMINAL</div>
<div id="date"></div>
</div>

<div id="left">

<div class="panel">
<h4>CRYPTO</h4>

<div class="asset">
<span>BTC</span>
<canvas id="btcChart"></canvas>
<span id="btcChange"></span>
</div>

<div class="asset">
<span>ETH</span>
<canvas id="ethChart"></canvas>
<span id="ethChange"></span>
</div>

</div>

<div class="panel">
<h4>INDICES</h4>
<div class="asset"><span>SPX</span><span></span><span class="green">+0.48%</span></div>
<div class="asset"><span>NDQ</span><span></span><span class="green">+0.72%</span></div>
<div class="asset"><span>WIG</span><span></span><span class="green">+0.62%</span></div>
</div>

</div>

<div id="center" class="panel">
<iframe src="https://embed.windy.com/embed2.html?lat=53.1&lon=18&zoom=6&overlay=radar"></iframe>
</div>

<div id="right">

<div class="panel">
<h4>NEWS</h4>
<ul id="news"></ul>
</div>

<div class="panel">
<h4>AIR</h4>
<div id="air"></div>
</div>

</div>

<div id="bottom">

<div class="panel">
<h4>TRAFFIC</h4>
<iframe src="https://www.google.com/maps?q=traffic%20Bydgoszcz&output=embed"></iframe>
</div>

<div class="panel">
<h4>FLIGHTS</h4>
<iframe src="https://globe.adsbexchange.com/"></iframe>
</div>

<div class="panel">
<h4>SUN</h4>
<div id="sun"></div>
</div>

</div>

<script>

// CLOCK
setInterval(()=>{
let d=new Date();
clock.innerText=d.toLocaleTimeString();
date.innerText=d.toLocaleDateString();
},1000);

// CHARTS
let btcData=[], ethData=[];

let btcChart=new Chart(document.getElementById("btcChart"),{
type:"line",
data:{labels:[],datasets:[{data:btcData,borderColor:"#00ff88"}]},
options:{plugins:{legend:false},scales:{x:{display:false},y:{display:false}}}
});

let ethChart=new Chart(document.getElementById("ethChart"),{
type:"line",
data:{labels:[],datasets:[{data:ethData,borderColor:"#00aaff"}]},
options:{plugins:{legend:false},scales:{x:{display:false},y:{display:false}}}
});

// DATA
async function load(){
let btc=await fetch("https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT").then(r=>r.json());
let eth=await fetch("https://api.binance.com/api/v3/ticker/24hr?symbol=ETHUSDT").then(r=>r.json());

let b=parseFloat(btc.lastPrice);
let e=parseFloat(eth.lastPrice);

btcData.push(b);
ethData.push(e);

if(btcData.length>40) btcData.shift();
if(ethData.length>40) ethData.shift();

btcChart.update();
ethChart.update();

btcChange.innerText=btc.priceChangePercent+"%";
btcChange.className=btc.priceChangePercent>0?"green":"red";

ethChange.innerText=eth.priceChangePercent+"%";
ethChange.className=eth.priceChangePercent>0?"green":"red";
}

setInterval(load,3000);
load();

// NEWS
fetch("https://api.allorigins.win/get?url="+encodeURIComponent("https://www.bankier.pl/rss/wiadomosci.xml"))
.then(r=>r.json())
.then(d=>{
let xml=new DOMParser().parseFromString(d.contents,"text/xml");
xml.querySelectorAll("item").forEach((i,x)=>{
if(x<5){
let li=document.createElement("li");
li.innerText=i.querySelector("title").textContent;
news.appendChild(li);
}
});
});

// AIR
fetch("https://api.openaq.org/v2/latest?coordinates=53.12,18.00")
.then(r=>r.json())
.then(d=>{
air.innerText="PM2.5: "+(d.results[0]?.measurements[0]?.value || "brak");
});

// SUN
fetch("https://api.sunrise-sunset.org/json?lat=53.12&lng=18.00&formatted=0")
.then(r=>r.json())
.then(d=>{
sun.innerText="↑ "+new Date(d.results.sunrise).toLocaleTimeString()+" ↓ "+new Date(d.results.sunset).toLocaleTimeString();
});

</script>

</body>
</html>
