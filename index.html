<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Dashboard ULTRA</title>

<style>
body{
margin:0;
font-family:Segoe UI;
color:#fff;
height:100vh;
display:grid;
grid-template-rows:150px 1fr 120px;
gap:12px;
padding:12px;

/* 🔥 tło */
background:
radial-gradient(circle at 20% 20%, #1a2a3a, transparent),
radial-gradient(circle at 80% 80%, #0a1a2a, transparent),
#0b0f14;
}

/* 🔥 GLASS */
.glass{
background:linear-gradient(
145deg,
rgba(255,255,255,0.08),
rgba(255,255,255,0.02)
);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.12);
border-radius:18px;
box-shadow:
0 10px 40px rgba(0,0,0,.5),
inset 0 1px 0 rgba(255,255,255,0.1);
}

/* TOP */
#top{
display:grid;
grid-template-columns:2fr 1fr 1fr 1fr;
gap:12px;
}

.widget{
padding:14px;
}

/* SYSTEM VIEW */
#viewer{
position:relative;
overflow:hidden;
transition:0.4s;
}

.system{
position:absolute;
width:100%;
height:100%;
border:none;
opacity:0;
transform:scale(1.03);
transition:opacity 0.5s ease, transform 0.5s ease;
}

.system.active{
opacity:1;
transform:scale(1);
}

/* BOTTOM */
#bottom{
display:flex;
gap:12px;
}

.tile{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.3s;
font-size:12px;
gap:6px;
}

.tile:hover{
transform:translateY(-4px);
background:rgba(255,255,255,0.1);
}

.tile.active{
border:2px solid #00ff88;
box-shadow:0 0 20px rgba(0,255,136,0.5);
}

/* IKONY */
.icon{
font-size:22px;
}

/* subtelny glow aktywnego */
.tile.active .icon{
filter:drop-shadow(0 0 6px #00ff88);
}

iframe{
width:100%;
height:100%;
border:none;
}

</style>
</head>

<body>

<!-- 🔥 TOP -->
<div id="top">

<!-- pogoda -->
<div class="widget glass">
<div id="ww_f8f157805e891"></div>
<script async src="https://app3.weatherwidget.org/js/?id=ww_f8f157805e891"></script>
</div>

<!-- forecast -->
<div class="widget glass">
<div style="font-size:14px;opacity:.7">Prognoza</div>
<div style="font-size:22px;">🌤 🌧 ☀️</div>
</div>

<!-- air -->
<div class="widget glass">
<div style="font-size:14px;opacity:.7">Powietrze</div>
<div style="font-size:28px;color:#00ff88;">GOOD</div>
</div>

<!-- sun -->
<div class="widget glass">
<div>🌅 04:45</div>
<div>🌇 21:05</div>
</div>

</div>

<!-- 🔥 VIEWER -->
<div id="viewer" class="glass">

<iframe id="radar" class="system active"
src="https://embed.windy.com/embed2.html?lat=53.12&lon=18.00&zoom=6&overlay=radar"></iframe>

<iframe id="its" class="system"
src="https://www.its.bydgoszcz.pl/mapa"></iframe>

</div>

<!-- 🔥 BOTTOM -->
<div id="bottom">

<div class="tile glass active" onclick="show('radar', this)">
<div class="icon">🌧</div>
RADAR
</div>

<div class="tile glass" onclick="show('its', this)">
<div class="icon">🚦</div>
ITS
</div>

</div>

<script>

function show(id, el){

document.querySelectorAll(".system").forEach(s=>{
s.classList.remove("active");
});
document.getElementById(id).classList.add("active");

document.querySelectorAll(".tile").forEach(t=>{
t.classList.remove("active");
});
el.classList.add("active");

}

</script>

</body>
</html>
