<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
background:#0b0f14;
font-family:Segoe UI;
color:#fff;
display:grid;
grid-template-columns:260px 1fr 320px;
grid-template-rows:50px 1fr 200px;
gap:6px;
height:100vh;
padding:6px;
}

#top{
grid-column:1/4;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 12px;
background:#0f1620;
border:1px solid rgba(255,255,255,.05);
}

.panel{
background:#0f1620;
border:1px solid rgba(255,255,255,.05);
padding:6px;
overflow:hidden;
}

#left{display:flex;flex-direction:column;gap:6px;}
#right{display:flex;flex-direction:column;gap:6px;}
#bottom{grid-column:1/4;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}

iframe{
width:100%;
height:100%;
border:none;
}

/* fallback */
.centerMsg{
display:flex;
justify-content:center;
align-items:center;
height:100%;
opacity:.7;
text-align:center;
}
</style>
</head>

<body>

<div id="top">
<div id="clock"></div>
<div>TERMINAL</div>
<div id="date"></div>
</div>

<div id="left">

<div class="panel">CRYPTO</div>
<div class="panel">INDICES</div>

</div>

<div class="panel">
<iframe src="https://embed.windy.com/embed2.html?lat=50&lon=15&zoom=5&overlay=radar"></iframe>
</div>

<div id="right">

<div class="panel">NEWS</div>
<div class="panel">AIR</div>

</div>

<div id="bottom">

<!-- TRAFFIC -->
<div class="panel">

<div id="itsBox" class="centerMsg">
Ładowanie ITS...
</div>

</div>

<div class="panel">
<iframe src="https://globe.adsbexchange.com/"></iframe>
</div>

<div class="panel">
SUN
</div>

</div>

<script>

// CLOCK
setInterval(()=>{
let d=new Date();
clock.innerText=d.toLocaleTimeString();
date.innerText=d.toLocaleDateString();
},1000);

// SAFE ITS LOAD
const its = document.createElement("iframe");
its.src = "https://www.its.bydgoszcz.pl/";

its.onload = () => {
document.getElementById("itsBox").innerHTML="";
document.getElementById("itsBox").appendChild(its);
};

its.onerror = () => {
document.getElementById("itsBox").innerHTML =
"ITS blokuje osadzanie 🚫<br>Wejdź ręcznie: its.bydgoszcz.pl";
};

</script>

</body>
</html>
