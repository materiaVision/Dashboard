<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body{
margin:0;
background:#0b0f14;
font-family:Segoe UI;
color:#fff;
display:grid;
grid-template-columns:260px 1fr 320px;
grid-template-rows:50px 1fr 300px;
gap:6px;
height:100vh;
padding:6px;
}

#top{
grid-column:1/4;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 12px;
background:#0f1620;
border:1px solid rgba(255,255,255,.05);
}

.panel{
background:#0f1620;
border:1px solid rgba(255,255,255,.05);
padding:6px;
overflow:hidden;
}

#left{display:flex;flex-direction:column;gap:6px;}
#right{display:flex;flex-direction:column;gap:6px;}

/* TRAFFIC FULL WIDTH */
#traffic{
grid-column:1/4;
position:relative;
}

iframe{
width:100%;
height:100%;
border:none;
}

/* overlay (żeby wyglądało jak terminal) */
#traffic::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.4));
pointer-events:none;
}

.centerMsg{
display:flex;
justify-content:center;
align-items:center;
height:100%;
opacity:.7;
text-align:center;
}
</style>
</head>

<body>

<div id="top">
<div id="clock"></div>
<div>TERMINAL</div>
<div id="date"></div>
</div>

<div id="left">
<div class="panel">CRYPTO</div>
<div class="panel">INDICES</div>
</div>

<div class="panel">
<iframe src="https://embed.windy.com/embed2.html?lat=50&lon=15&zoom=5&overlay=radar"></iframe>
</div>

<div id="right">
<div class="panel">NEWS</div>
<div class="panel">AIR</div>
</div>

<!-- 🔥 DUŻY TRAFFIC -->
<div id="traffic" class="panel">

<div id="itsBox" class="centerMsg">
Ładowanie ITS...
</div>

</div>

<script>

// CLOCK
setInterval(()=>{
let d=new Date();
clock.innerText=d.toLocaleTimeString();
date.innerText=d.toLocaleDateString();
},1000);

// ITS LOAD (stabilny)
function loadITS(){
const box = document.getElementById("itsBox");
box.innerHTML = "";

const iframe = document.createElement("iframe");

// próbujemy konkretny widok mapy
iframe.src = "https://www.its.bydgoszcz.pl/";

iframe.onload = () => {
console.log("ITS loaded");
};

iframe.onerror = () => {
box.innerHTML = "ITS blokuje mapę 🚫<br>Otwórz ręcznie: its.bydgoszcz.pl";
};

box.appendChild(iframe);
}

// start
loadITS();

// odświeżanie co 60s (bo ITS często się “zawiesza”)
setInterval(loadITS, 60000);

</script>

</body>
</html>
