<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard PRO</title>

<style>
body {
margin:0;
font-family: Arial;
background:#0b0f14;
color:#fff;
display:grid;
grid-template-columns:320px 1fr 320px;
grid-template-rows:1fr 300px;
gap:12px;
height:100vh;
padding:12px;
}

.card {
background:#111821;
border-radius:12px;
padding:12px;
box-shadow:0 0 15px rgba(0,0,0,0.6);
overflow:hidden;
}

iframe{width:100%;height:100%;border:none;border-radius:8px;}

#centerBottom{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

#clock{font-size:38px;font-weight:bold;}
.small{opacity:0.7;font-size:13px;}

.asset{
display:flex;
justify-content:space-between;
margin-bottom:6px;
font-size:14px;
}

.green{color:#4caf50;}
.red{color:#f44336;}
</style>
</head>

<body>

<!-- LEFT -->
<div style="display:flex;flex-direction:column;gap:10px;">

<div class="card">
<div id="clock"></div>
<div class="small" id="date"></div>
</div>

<div class="card">
<h3>Krypto</h3>
<div id="crypto"></div>
</div>

<div class="card">
<h3>Indeksy</h3>
<iframe src="https://s.tradingview.com/widgetembed/?frameElementId=tradingview&symbol=SPX&interval=D&theme=dark"></iframe>
</div>

</div>

<div class="card">
<iframe src="https://www.google.com/maps?q=Bydgoszcz&output=embed"></iframe>
</div>

<!-- CENTER -->
<div class="card">
<iframe src="https://embed.windy.com/embed2.html?lat=53.1&lon=18.0&zoom=6&overlay=radar"></iframe>
</div>

<div id="centerBottom">

<div class="card">
<h3>Ruch</h3>
<iframe src="https://www.google.com/maps?q=traffic%20Bydgoszcz&output=embed"></iframe>
</div>

<div class="card">
<h3>Samoloty</h3>
<iframe src="https://globe.adsbexchange.com/"></iframe>
</div>

<div class="card">
<h3>Powietrze</h3>
<div id="air"></div>
</div>

</div>

<!-- RIGHT -->
<div style="display:flex;flex-direction:column;gap:10px;">

<div class="card">
<h3>Waluty</h3>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=FX:EURPLN&interval=D&theme=dark"></iframe>
</div>

<div class="card">
<h3>Wiadomości</h3>
<ul id="news"></ul>
</div>

</div>

<div class="card">
<h3>Słońce</h3>
<div id="sun"></div>
</div>

<script>
// CLOCK
setInterval(()=>{
let d=new Date();
clock.innerText=d.toLocaleTimeString();
date.innerText=d.toLocaleDateString();
},1000);

// CRYPTO (BINANCE)
async function loadCrypto(){
try{
let btc=await fetch("https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT").then(r=>r.json());
let eth=await fetch("https://api.binance.com/api/v3/ticker/24hr?symbol=ETHUSDT").then(r=>r.json());

crypto.innerHTML=`
<div class="asset">BTC ${parseFloat(btc.lastPrice).toFixed(0)} <span class="${btc.priceChangePercent>0?'green':'red'}">${parseFloat(btc.priceChangePercent).toFixed(2)}%</span></div>
<div class="asset">ETH ${parseFloat(eth.lastPrice).toFixed(0)} <span class="${eth.priceChangePercent>0?'green':'red'}">${parseFloat(eth.priceChangePercent).toFixed(2)}%</span></div>
`;
}catch{
crypto.innerText="Błąd danych";
}
}
loadCrypto();
setInterval(loadCrypto,10000);

// AIR
fetch("https://api.openaq.org/v2/latest?coordinates=53.12,18.00")
.then(r=>r.json())
.then(d=>{
air.innerText="PM2.5: "+(d.results[0]?.measurements[0]?.value || "brak");
});

// NEWS
fetch("https://api.allorigins.win/get?url="+encodeURIComponent("https://www.bankier.pl/rss/wiadomosci.xml"))
.then(r=>r.json())
.then(d=>{
let xml=new DOMParser().parseFromString(d.contents,"text/xml");
let items=xml.querySelectorAll("item");
news.innerHTML="";
items.forEach((i,x)=>{
if(x<5){
let li=document.createElement("li");
li.innerText=i.querySelector("title").textContent;
news.appendChild(li);
}
});
});

// SUN
fetch("https://api.sunrise-sunset.org/json?lat=53.12&lng=18.00&formatted=0")
.then(r=>r.json())
.then(d=>{
let sr=new Date(d.results.sunrise).toLocaleTimeString();
let ss=new Date(d.results.sunset).toLocaleTimeString();
sun.innerText="Wschód: "+sr+" | Zachód: "+ss;
});
</script>

</body>
</html>
