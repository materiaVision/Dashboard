<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard PRO</title>

<style>
body{
margin:0;
background:#0b0f14;
font-family:Segoe UI;
color:#fff;
display:grid;
grid-template-columns:260px 1fr 320px;
grid-template-rows:50px 1fr 320px;
gap:6px;
height:100vh;
padding:6px;
}

#top{
grid-column:1/4;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 12px;
background:#0f1620;
border:1px solid rgba(255,255,255,.05);
}

.panel{
background:#0f1620;
border:1px solid rgba(255,255,255,.05);
padding:6px;
overflow:hidden;
}

#left{display:flex;flex-direction:column;gap:6px;}
#right{display:flex;flex-direction:column;gap:6px;}

#traffic{
grid-column:1/4;
position:relative;
}

/* iframe */
#traffic iframe{
width:100%;
height:100%;
border:none;
}

/* overlay HUD */
#traffic::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.5));
pointer-events:none;
}

/* loader */
#loader{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
opacity:.7;
background:#0b0f14;
z-index:2;
}
</style>
</head>

<body>

<div id="top">
<div id="clock"></div>
<div>GLOBAL TERMINAL</div>
<div id="date"></div>
</div>

<div id="left">
<div class="panel">CRYPTO</div>
<div class="panel">INDICES</div>
</div>

<div class="panel">
<iframe src="https://embed.windy.com/embed2.html?lat=53.12&lon=18.00&zoom=6&overlay=radar"></iframe>
</div>

<div id="right">
<div class="panel">NEWS</div>
<div class="panel">AIR</div>
</div>

<!-- 🔥 PRO ITS -->
<div id="traffic" class="panel">

<div id="loader">Ładowanie ITS...</div>

<iframe id="itsFrame"
src="https://www.its.bydgoszcz.pl/mapa">
</iframe>

</div>

<script>

// CLOCK
setInterval(()=>{
let d=new Date();
clock.innerText=d.toLocaleTimeString();
date.innerText=d.toLocaleDateString();
},1000);

// loader hide
const frame = document.getElementById("itsFrame");
frame.onload = () => {
document.getElementById("loader").style.display = "none";
};

// AUTO REFRESH (ITS lubi się zawiesić)
setInterval(()=>{
frame.src = frame.src;
}, 120000); // co 2 min

</script>

</body>
</html>
