<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Dashboard PRO</title>

<style>
body{
margin:0;
background:linear-gradient(135deg,#0b0f14,#0f1a25);
font-family:Segoe UI;
color:#fff;
display:grid;
grid-template-rows:150px 1fr 120px;
gap:10px;
height:100vh;
padding:10px;
}

/* 🔥 GLASS */
.widget, #viewer, .tile{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.12);
border-radius:16px;
box-shadow:0 8px 30px rgba(0,0,0,.4);
}

/* TOP */
#top{
display:grid;
grid-template-columns:2fr 1fr 1fr 1fr;
gap:10px;
}

.widget{
padding:12px;
display:flex;
flex-direction:column;
justify-content:center;
}

/* SYSTEM VIEW */
#viewer{
position:relative;
overflow:hidden;
}

.system{
position:absolute;
width:100%;
height:100%;
border:none;
opacity:0;
transition:opacity 0.5s ease;
}

.system.active{
opacity:1;
}

/* BOTTOM */
#bottom{
display:flex;
gap:10px;
}

.tile{
flex:1;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.25s;
font-weight:500;
}

.tile:hover{
background:rgba(255,255,255,0.12);
}

.tile.active{
border:2px solid #00ff88;
box-shadow:0 0 15px rgba(0,255,136,0.4);
}

</style>
</head>

<body>

<!-- 🔥 TOP -->
<div id="top">

<!-- 🌤 WIDGET POGODOWY (TEN ZE ZDJĘCIA - DZIAŁAJĄCY) -->
<div class="widget">

<div id="ww_f8f157805e891" v='1.3' loc='id' a='{"t":"horizontal","lang":"pl","sl_lpl":1,"ids":[],"font":"Arial","sl_ics":"one_a","sl_sot":"celsius","cl_bkg":"image","cl_font":"#FFFFFF","cl_cloud":"#FFFFFF","cl_persp":"#81D4FA","cl_sun":"#FFC107","cl_moon":"#FFC107","cl_thund":"#FF5722"}'>
</div>

<script async src="https://app3.weatherwidget.org/js/?id=ww_f8f157805e891"></script>

</div>

<!-- forecast (na razie placeholder) -->
<div class="widget">
<div style="font-size:14px;">Prognoza</div>
<div style="font-size:20px;">🌤 🌧 ☀️</div>
</div>

<!-- air -->
<div class="widget">
<div style="font-size:14px;">Jakość powietrza</div>
<div style="font-size:28px;color:#00ff88;">GOOD</div>
</div>

<!-- sun -->
<div class="widget">
<div>🌅 04:45</div>
<div>🌇 21:05</div>
</div>

</div>

<!-- 🔥 SYSTEM VIEW -->
<div id="viewer">

<iframe id="radar" class="system active"
src="https://embed.windy.com/embed2.html?lat=53.12&lon=18.00&zoom=6&overlay=radar"></iframe>

<iframe id="its" class="system"
src="https://www.its.bydgoszcz.pl/mapa"></iframe>

</div>

<!-- 🔥 BOTTOM -->
<div id="bottom">

<div class="tile active" onclick="show('radar', this)">
RADAR
</div>

<div class="tile" onclick="show('its', this)">
ITS
</div>

</div>

<script>

function show(id, el){

document.querySelectorAll(".system").forEach(s=>{
s.classList.remove("active");
});
document.getElementById(id).classList.add("active");

document.querySelectorAll(".tile").forEach(t=>{
t.classList.remove("active");
});
el.classList.add("active");

}

</script>

</body>
</html>
