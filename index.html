<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body{
margin:0;
font-family:Segoe UI;
color:#fff;
height:100vh;
display:grid;
grid-template-rows:150px 1fr 120px;
gap:12px;
padding:12px;
background:#0b0f14;
}

/* GLASS */
.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.12);
border-radius:18px;
box-shadow:0 10px 40px rgba(0,0,0,.5);
}

/* TOP */
#top{
display:grid;
grid-template-columns:2fr 2fr 1fr 1fr;
gap:12px;
}

.widget{
padding:14px;
}

/* VIEWER */
#viewer{
position:relative;
overflow:hidden;
}

.system{
position:absolute;
width:100%;
height:100%;
border:none;
opacity:0;
transition:0.4s;
}

.system.active{
opacity:1;
}

/* BOTTOM */
#bottom{
display:flex;
gap:12px;
}

.tile{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.3s;
gap:6px;
}

.tile:hover{
transform:translateY(-4px);
}

.tile.active{
border:2px solid #00ff88;
box-shadow:0 0 20px rgba(0,255,136,0.6);
}

.icon{
font-size:22px;
}

iframe{
width:100%;
height:100%;
border:none;
}
</style>
</head>

<body>

<!-- TOP -->
<div id="top">

<!-- 🌤 POGODA (NA 100% DZIAŁA) -->
<div class="widget glass">
<iframe src="https://wttr.in/Bydgoszcz?format=4"></iframe>
</div>

<!-- FORECAST -->
<div class="widget glass">
<iframe src="https://wttr.in/Bydgoszcz?0"></iframe>
</div>

<!-- AQI -->
<div class="widget glass">
<iframe src="https://wttr.in/Bydgoszcz?format=3"></iframe>
</div>

<!-- SUN -->
<div class="widget glass">
<iframe src="https://wttr.in/Bydgoszcz?format=%S"></iframe>
</div>

</div>

<!-- VIEWER -->
<div id="viewer" class="glass">

<iframe id="radar" class="system active"
src="https://embed.windy.com/embed2.html?lat=53.12&lon=18.00&zoom=6&overlay=radar"></iframe>

<iframe id="its" class="system"
src="https://www.its.bydgoszcz.pl/mapa"></iframe>

</div>

<!-- BOTTOM -->
<div id="bottom">

<div class="tile glass active" onclick="show('radar', this)">
<div class="icon">🌧</div>RADAR</div>

<div class="tile glass" onclick="show('its', this)">
<div class="icon">🚦</div>ITS</div>

</div>

<script>
function show(id, el){
document.querySelectorAll(".system").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");

document.querySelectorAll(".tile").forEach(t=>t.classList.remove("active"));
el.classList.add("active");
}
</script>

</body>
</html>
