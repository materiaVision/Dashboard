<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Dashboard ULTRA</title>

<style>
body{
margin:0;
font-family:Segoe UI;
color:#fff;
height:100vh;
display:grid;
grid-template-rows:150px 1fr 120px;
gap:12px;
padding:12px;
transition:background 1s ease;
background:#0b0f14;
}

/* 🌈 KLIMAT */
body.sunny{
background:
radial-gradient(circle at 20% 20%, #ffb74d, transparent),
radial-gradient(circle at 80% 80%, #ff7043, transparent),
#0b0f14;
}

body.cloudy{
background:
radial-gradient(circle at 20% 20%, #607d8b, transparent),
radial-gradient(circle at 80% 80%, #455a64, transparent),
#0b0f14;
}

body.rain{
background:
radial-gradient(circle at 20% 20%, #2196f3, transparent),
radial-gradient(circle at 80% 80%, #0d47a1, transparent),
#0b0f14;
}

/* GLASS */
.glass{
background:linear-gradient(145deg,rgba(255,255,255,0.08),rgba(255,255,255,0.02));
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.12);
border-radius:18px;
box-shadow:0 10px 40px rgba(0,0,0,.5);
}

/* TOP */
#top{
display:grid;
grid-template-columns:2fr 2fr 1fr 1fr;
gap:12px;
}

.widget{
padding:14px;
}

/* WEATHER */
.weather{
display:flex;
align-items:center;
gap:15px;
}

.weather img{
width:64px;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}

.weatherTemp{
font-size:32px;
}

/* FORECAST */
.forecast{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.day{
text-align:center;
font-size:13px;
}

/* VIEWER */
#viewer{
position:relative;
overflow:hidden;
}

.system{
position:absolute;
width:100%;
height:100%;
border:none;
opacity:0;
transform:scale(1.05);
transition:0.5s;
}

.system.active{
opacity:1;
transform:scale(1);
}

/* BOTTOM */
#bottom{
display:flex;
gap:12px;
}

.tile{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.3s;
gap:6px;
}

.tile:hover{
transform:translateY(-6px) scale(1.03);
}

.tile.active{
border:2px solid #00ff88;
box-shadow:0 0 25px rgba(0,255,136,0.6);
}

.icon{
font-size:22px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%,100%{opacity:1;}
50%{opacity:0.6;}
}

iframe{
width:100%;
height:100%;
border:none;
}
</style>
</head>

<body>

<!-- TOP -->
<div id="top">

<div class="widget glass">
<div class="weather">
<img id="weatherIcon">
<div>
<div class="weatherTemp" id="temp">--°C</div>
<div id="desc">Ładowanie...</div>
</div>
</div>
</div>

<div class="widget glass">
<div>Prognoza</div>
<div class="forecast" id="forecast"></div>
</div>

<div class="widget glass">
<div>Powietrze</div>
<div id="aqiValue">--</div>
</div>

<div class="widget glass">
<div id="sunrise">--</div>
<div id="sunset">--</div>
</div>

</div>

<!-- VIEWER -->
<div id="viewer" class="glass">

<iframe id="radar" class="system active"
src="https://embed.windy.com/embed2.html?lat=53.12&lon=18.00&zoom=6&overlay=radar"></iframe>

<iframe id="its" class="system"
src="https://www.its.bydgoszcz.pl/mapa"></iframe>

</div>

<!-- BOTTOM -->
<div id="bottom">

<div class="tile glass active" onclick="show('radar', this)">
<div class="icon">🌧</div>
RADAR
</div>

<div class="tile glass" onclick="show('its', this)">
<div class="icon">🚦</div>
ITS
</div>

</div>

<script>

// SWITCH
function show(id, el){
document.querySelectorAll(".system").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");

document.querySelectorAll(".tile").forEach(t=>t.classList.remove("active"));
el.classList.add("active");
}

// WEATHER
async function loadWeather(){
try{
const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=53.1235&longitude=18.0084&current_weather=true&daily=temperature_2m_max,sunrise,sunset,weathercode&timezone=auto");
const data = await res.json();

const w = data.current_weather;

document.getElementById("temp").innerText = w.temperature + "°C";

// KLIMAT FIX
document.body.classList.remove("sunny","cloudy","rain");

if(w.weathercode < 2){
document.body.classList.add("sunny");
}else if(w.weathercode < 4){
document.body.classList.add("cloudy");
}else{
document.body.classList.add("rain");
}

// ICON
const icon = w.weathercode < 3
? "https://cdn-icons-png.flaticon.com/512/869/869869.png"
: "https://cdn-icons-png.flaticon.com/512/414/414825.png";

document.getElementById("weatherIcon").src = icon;

// DESC
document.getElementById("desc").innerText = "Warunki aktualne";

// FORECAST
let html="";
for(let i=0;i<5;i++){
html += `<div class="day">${Math.round(data.daily.temperature_2m_max[i])}°</div>`;
}
document.getElementById("forecast").innerHTML = html;

// SUN
document.getElementById("sunrise").innerText = "🌅 " + data.daily.sunrise[0].slice(11,16);
document.getElementById("sunset").innerText = "🌇 " + data.daily.sunset[0].slice(11,16);

}catch(e){
document.getElementById("temp").innerText="--°C";
document.getElementById("desc").innerText="Brak danych";
}
}

// AQI
async function loadAQI(){
try{
const res = await fetch("https://air-quality-api.open-meteo.com/v1/air-quality?latitude=53.1235&longitude=18.0084&current=pm10");
const data = await res.json();

document.getElementById("aqiValue").innerText = data.current.pm10;

}catch(e){
document.getElementById("aqiValue").innerText="--";
}
}

// START
loadWeather();
loadAQI();

</script>

</body>
</html>
