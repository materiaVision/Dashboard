<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f14;
    color: #fff;
    display: grid;
    grid-template-columns: 300px 1fr 300px;
    grid-template-rows: auto auto 1fr;
    gap: 15px;
    padding: 15px;
    height: 100vh;
    box-sizing: border-box;
}

.card {
    background: #1c1c26;
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
    overflow: hidden;
}

h3 {
    margin-top: 0;
}

/* UKŁAD */
#clockCard { grid-column: 1; grid-row: 1; }
#finance { grid-column: 1; grid-row: 2; }
#map { grid-column: 1; grid-row: 3; }

#radar { grid-column: 2; grid-row: 1 / 3; }

#planes { grid-column: 2; grid-row: 3; }

#news1 { grid-column: 3; grid-row: 1; }
#news2 { grid-column: 3; grid-row: 2; }
#status { grid-column: 3; grid-row: 3; }

#clock {
    font-size: 32px;
    text-align: center;
}

/* RESPONSYWNOŚĆ */
@media (max-width: 1000px) {
    body {
        grid-template-columns: 1fr;
        grid-template-rows: auto;
    }
}
</style>
</head>

<body>

<!-- 1 -->
<div class="card" id="clockCard">
    <h3>Data i godzina</h3>
    <div id="clock">--:--</div>
</div>

<!-- 3 + 4 -->
<div class="card" id="finance">
    <h3>Finanse</h3>
    <p>WIG20: ...</p>
    <p>SP500: ...</p>
    <p>BTC: ...</p>
</div>

<!-- 10 -->
<div class="card" id="map">
    <h3>Mapa ruchu</h3>
    <iframe
        width="100%"
        height="100%"
        frameborder="0"
        src="https://www.google.com/maps?q=Bydgoszcz&output=embed">
    </iframe>
</div>

<!-- 8 -->
<div class="card" id="radar">
    <h3>Radar pogodowy</h3>
    <iframe
        width="100%"
        height="100%"
        frameborder="0"
        src="https://embed.windy.com/embed2.html?lat=53.1235&lon=18.0084&zoom=6&level=surface&overlay=radar&message=false">
    </iframe>
</div>

<!-- 11 -->
<div class="card" id="planes">
    <h3>Samoloty</h3>
    <p>Tu będzie radar lotów</p>
</div>

<!-- 5 -->
<div class="card" id="news1">
    <h3>Wiadomości finansowe</h3>
    <p>Loading...</p>
</div>

<!-- 6 -->
<div class="card" id="news2">
    <h3>Wiadomości Polska</h3>
    <p>Loading...</p>
</div>

<!-- 9 -->
<div class="card" id="status">
    <h3>Status</h3>
    <p>Internet: OK</p>
    <p>System: OK</p>
</div>

<script>
function updateClock() {
    const now = new Date();
    document.getElementById("clock").innerText =
        now.toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
