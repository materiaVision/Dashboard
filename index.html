<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Terminal</title>

<style>
body{
margin:0;
background:#0b0f14;
font-family:Segoe UI;
color:#fff;
display:grid;
grid-template-columns:1fr;
grid-template-rows:1fr;
height:100vh;
}

.panel{
background:#0f1620;
border:1px solid rgba(255,255,255,.05);
padding:6px;
}

/* MAP */
#mapWrapper{
position:relative;
width:100%;
height:100%;
overflow:hidden;
}

#map{
width:100%;
height:100%;
filter:brightness(.5) contrast(1.3);
}

/* ROADS */
.road{
position:absolute;
height:3px;
border-radius:2px;
overflow:hidden;
}

.flow{
position:absolute;
width:50px;
height:100%;
background:linear-gradient(90deg, transparent, rgba(255,255,255,.9), transparent);
animation:move 2s linear infinite;
}

@keyframes move{
0%{left:-50px;}
100%{left:100%;}
}

/* COLORS */
.green{background:#00ff88;}
.yellow{background:#ffee00;}
.red{background:#ff0000;}
</style>
</head>

<body>

<div class="panel">

<div id="mapWrapper">

<iframe id="map"
src="https://www.openstreetmap.org/export/embed.html?bbox=17.9%2C52.95%2C18.2%2C53.2">
</iframe>

<!-- GŁÓWNE DROGI -->
<div class="road" style="top:40%; left:5%; width:85%;" id="r1"><div class="flow"></div></div>
<div class="road" style="top:55%; left:10%; width:70%;" id="r2"><div class="flow"></div></div>
<div class="road" style="top:65%; left:20%; width:60%;" id="r3"><div class="flow"></div></div>

<!-- PIONOWE -->
<div class="road" style="top:10%; left:40%; width:3px; height:80%;" id="r4"><div class="flow"></div></div>
<div class="road" style="top:15%; left:60%; width:3px; height:70%;" id="r5"><div class="flow"></div></div>

<!-- OBWODNICA / ŁUK -->
<div class="road" style="top:30%; left:20%; width:60%; transform:rotate(20deg);" id="r6"><div class="flow"></div></div>
<div class="road" style="top:50%; left:25%; width:50%; transform:rotate(-20deg);" id="r7"><div class="flow"></div></div>

</div>

</div>

<script>

// LOSOWY TRAFFIC (LIVE FEEL)
const roads = ["r1","r2","r3","r4","r5","r6","r7"];

function randomTraffic(){
roads.forEach(id=>{
const el = document.getElementById(id);

// losowanie poziomu ruchu
const rand = Math.random();

el.classList.remove("green","yellow","red");

if(rand < 0.5){
el.classList.add("green");
}else if(rand < 0.8){
el.classList.add("yellow");
}else{
el.classList.add("red");
}

// zmiana prędkości animacji = ruch
const flow = el.querySelector(".flow");
flow.style.animationDuration = (1 + Math.random()*2) + "s";
});
}

// start
randomTraffic();
setInterval(randomTraffic, 3000);

</script>

</body>
</html>
