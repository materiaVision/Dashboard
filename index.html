<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Dashboard ULTRA</title>

<style>
body{
margin:0;
font-family:Segoe UI;
color:#fff;
height:100vh;
display:grid;
grid-template-rows:150px 1fr 120px;
gap:12px;
padding:12px;

background:
radial-gradient(circle at 20% 20%, #1a2a3a, transparent),
radial-gradient(circle at 80% 80%, #0a1a2a, transparent),
#0b0f14;
}

.glass{
background:linear-gradient(145deg,rgba(255,255,255,0.08),rgba(255,255,255,0.02));
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.12);
border-radius:18px;
box-shadow:0 10px 40px rgba(0,0,0,.5);
}

#top{
display:grid;
grid-template-columns:2fr 2fr 1fr 1fr;
gap:12px;
}

.widget{
padding:14px;
}

.weather{
display:flex;
align-items:center;
gap:15px;
}

.weather img{
width:64px;
}

.weatherTemp{
font-size:32px;
font-weight:600;
}

.forecast{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.day{
text-align:center;
font-size:13px;
}

.day img{
width:32px;
}

/* VIEWER */
#viewer{
position:relative;
overflow:hidden;
}

.system{
position:absolute;
width:100%;
height:100%;
border:none;
opacity:0;
transform:scale(1.03);
transition:0.5s;
}

.system.active{
opacity:1;
transform:scale(1);
}

/* BOTTOM */
#bottom{
display:flex;
gap:12px;
}

.tile{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.3s;
gap:6px;
}

.tile:hover{transform:translateY(-4px);}

.tile.active{
border:2px solid #00ff88;
box-shadow:0 0 20px rgba(0,255,136,0.5);
}

.icon{font-size:22px;}

iframe{
width:100%;
height:100%;
border:none;
}
</style>
</head>

<body>

<!-- TOP -->
<div id="top">

<div class="widget glass">
<div class="weather">
<img id="weatherIcon">
<div>
<div class="weatherTemp" id="temp">--°C</div>
<div id="desc"></div>
<div style="font-size:12px;opacity:.6" id="details"></div>
</div>
</div>
</div>

<div class="widget glass">
<div style="opacity:.7">Prognoza 5 dni</div>
<div class="forecast" id="forecast"></div>
</div>

<div class="widget glass">
<div>Powietrze</div>
<div id="aqiValue" style="font-size:28px">--</div>
<div id="aqiDesc" style="opacity:.7"></div>
</div>

<div class="widget glass">
<div id="sunrise">--</div>
<div id="sunset">--</div>
</div>

</div>

<!-- VIEWER -->
<div id="viewer" class="glass">

<iframe id="radar" class="system active"
src="https://embed.windy.com/embed2.html?lat=53.12&lon=18.00&zoom=6&overlay=radar"></iframe>

<iframe id="its" class="system"
src="https://www.its.bydgoszcz.pl/mapa"></iframe>

<!-- 🔥 LIVECAM (DZIAŁAJĄCA) -->
<iframe id="livecam" class="system"
src="https://www.skylinewebcams.com/en/webcam/poland/kuyavian-pomeranian/bydgoszcz.html">
</iframe>

</div>

<!-- BOTTOM -->
<div id="bottom">

<div class="tile glass active" onclick="show('radar', this)">
<div class="icon">🌧</div>RADAR</div>

<div class="tile glass" onclick="show('its', this)">
<div class="icon">🚦</div>ITS</div>

<div class="tile glass" onclick="show('livecam', this)">
<div class="icon">📹</div>LIVECAM</div>

</div>

<script>

// SWITCH
function show(id, el){
document.querySelectorAll(".system").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");

document.querySelectorAll(".tile").forEach(t=>t.classList.remove("active"));
el.classList.add("active");
}

// WEATHER
async function loadWeather(){

const url = "https://api.open-meteo.com/v1/forecast?latitude=53.1235&longitude=18.0084&current_weather=true&daily=temperature_2m_max,temperature_2m_min,sunrise,sunset,weathercode&timezone=auto";

const res = await fetch(url);
const data = await res.json();

const w = data.current_weather;

document.getElementById("temp").innerText = w.temperature + "°C";
document.getElementById("details").innerText = "Wiatr: " + w.windspeed + " km/h";

const icon = w.weathercode < 3
? "https://cdn-icons-png.flaticon.com/512/869/869869.png"
: "https://cdn-icons-png.flaticon.com/512/414/414825.png";

document.getElementById("weatherIcon").src = icon;

let html = "";
for(let i=0;i<5;i++){
html += `<div class="day"><div>${data.daily.time[i].slice(5)}</div><img src="${icon}"><div>${Math.round(data.daily.temperature_2m_max[i])}°</div></div>`;
}

document.getElementById("forecast").innerHTML = html;

document.getElementById("sunrise").innerText = "🌅 " + data.daily.sunrise[0].slice(11,16);
document.getElementById("sunset").innerText = "🌇 " + data.daily.sunset[0].slice(11,16);

}

// AQI
async function loadAQI(){

const url = "https://air-quality-api.open-meteo.com/v1/air-quality?latitude=53.1235&longitude=18.0084&current=pm10";

const res = await fetch(url);
const data = await res.json();

const pm10 = data.current.pm10;

let desc = "GOOD";
let color = "#00ff88";

if(pm10 > 50){desc="MODERATE"; color="yellow";}
if(pm10 > 100){desc="BAD"; color="red";}

document.getElementById("aqiValue").innerText = pm10;
document.getElementById("aqiDesc").innerText = desc;
document.getElementById("aqiValue").style.color = color;

}

// START
loadWeather();
loadAQI();

</script>

</body>
</html>
