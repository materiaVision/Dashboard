<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f14;
    color: #fff;
    display: grid;
    grid-template-columns: 300px 1fr 300px;
    grid-template-rows: auto auto 1fr;
    gap: 15px;
    padding: 15px;
    height: 100vh;
    box-sizing: border-box;
}

.card {
    background: #1c1c26;
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
    overflow: hidden;
}

h3 { margin-top: 0; }

/* UKŁAD */
#clockCard { grid-column: 1; grid-row: 1; }
#finance { grid-column: 1; grid-row: 2; }
#map { grid-column: 1; grid-row: 3; }

#radar { grid-column: 2; grid-row: 1 / 3; }
#planes { grid-column: 2; grid-row: 3; }

#news1 { grid-column: 3; grid-row: 1; }
#news2 { grid-column: 3; grid-row: 2; }
#status { grid-column: 3; grid-row: 3; }

#clock {
    font-size: 32px;
    text-align: center;
}

/* RESPONSYWNOŚĆ */
@media (max-width: 1000px) {
    body {
        grid-template-columns: 1fr;
        height: auto;
    }
}
</style>
</head>

<body>

<div class="card" id="clockCard">
    <h3>Data i godzina</h3>
    <div id="clock"></div>
</div>

<div class="card" id="finance">
    <h3>Finanse / Krypto</h3>
    <div id="financeData">Ładowanie...</div>
</div>

<div class="card" id="map">
    <h3>Mapa ruchu</h3>
    <iframe width="100%" height="100%" frameborder="0"
    src="https://www.google.com/maps?q=Bydgoszcz&output=embed"></iframe>
</div>

<div class="card" id="radar">
    <h3>Radar pogodowy</h3>
    <iframe width="100%" height="100%" frameborder="0"
    src="https://embed.windy.com/embed2.html?lat=53.1235&lon=18.0084&zoom=6&overlay=radar"></iframe>
</div>

<div class="card" id="planes">
    <h3>Samoloty</h3>
    <iframe width="100%" height="100%" frameborder="0"
    src="https://globe.adsbexchange.com/"></iframe>
</div>

<div class="card" id="news1">
    <h3>Finanse (świat)</h3>
    <ul id="newsFinance"></ul>
</div>

<div class="card" id="news2">
    <h3>Polska</h3>
    <ul id="newsPL"></ul>
</div>

<div class="card" id="status">
    <h3>Status</h3>
    <p id="internet">Internet: ...</p>
    <p id="system">System: OK</p>
    <p id="air">Powietrze: ...</p>
    <p id="sun">Słońce: ...</p>
</div>

<script>
// ZEGAR
function updateClock() {
    const now = new Date();
    document.getElementById("clock").innerText =
        now.toLocaleString();
}
setInterval(updateClock, 1000);
updateClock();

// INTERNET STATUS
function checkInternet() {
    document.getElementById("internet").innerText =
        navigator.onLine ? "Internet: OK" : "Internet: BRAK";
}
setInterval(checkInternet, 3000);
checkInternet();

// FINANSE + KRYPTO (proste API)
async function loadFinance() {
    try {
        let btc = await fetch("https://api.coindesk.com/v1/bpi/currentprice.json").then(r=>r.json());
        let price = btc.bpi.USD.rate;

        document.getElementById("financeData").innerHTML =
            "BTC: $" + price + "<br>ETH: (do dodania)<br>SP500: (API później)";
    } catch {
        document.getElementById("financeData").innerText = "Błąd danych";
    }
}
loadFinance();

// NEWSY (RSS proxy)
async function loadNews() {
    try {
        let res = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent("https://www.bankier.pl/rss/wiadomosci.xml"));
        let data = await res.json();

        let parser = new DOMParser();
        let xml = parser.parseFromString(data.contents, "text/xml");

        let items = xml.querySelectorAll("item");

        let list = document.getElementById("newsFinance");
        list.innerHTML = "";

        items.forEach((item, i) => {
            if(i<5){
                let li = document.createElement("li");
                li.innerText = item.querySelector("title").textContent;
                list.appendChild(li);
            }
        });

    } catch {}
}
loadNews();

// PROSTE POWIETRZE + SŁOŃCE (symulacja na razie)
document.getElementById("air").innerText = "Powietrze: OK";
document.getElementById("sun").innerText = "Wschód/Zachód: 5:00 / 21:00";

</script>

</body>
</html>
