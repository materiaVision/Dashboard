<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f14;
    color: #fff;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    padding: 15px;
}

.card {
    background: #1c1c26;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

h1 {
    grid-column: span 2;
    text-align: center;
    margin-bottom: 10px;
}

#clock {
    font-size: 40px;
    text-align: center;
}

textarea {
    width: 100%;
    height: 100px;
    border-radius: 10px;
    border: none;
    padding: 10px;
    background: #111;
    color: white;
    resize: none;
}
</style>
</head>

<body>

<h1>MY DASHBOARD</h1>

<div class="card">
    <h3>Zegar</h3>
    <div id="clock">--:--:--</div>
</div>

<div class="card">
    <h3>Notatki</h3>
    <textarea placeholder="Wpisz coś..."></textarea>
</div>

<div class="card">
    <h3>Status</h3>
    <p>System: OK</p>
    <p>Internet: OK</p>
</div>

<div class="card">
    <h3>Radar pogodowy</h3>

    <iframe
        width="100%"
        height="300"
        src="https://embed.windy.com/embed2.html?lat=53.1235&lon=18.0084&zoom=7&level=surface&overlay=radar&menu=&message=true&calendar=now"
        frameborder="0">
    </iframe>
</div>

<script>
function updateClock() {
    const now = new Date();
    document.getElementById("clock").innerText =
        now.toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();
</script>

<script>
let radarFrame = document.querySelector("iframe");

let offset = -60;

setInterval(() => {
    offset += 10;

    if (offset > 60) offset = -60;

    const url = `https://embed.windy.com/embed2.html?lat=53.1235&lon=18.0084&zoom=7&level=surface&overlay=radar&calendar=${offset}&message=true&type=map`;

    radarFrame.src = url;

}, 5000);
</script>
</body>
</html>
